    /* Calendar Container */
.calendar-2026 {

/* Year Badge */
.year-badge {
    text-align: center;
    margin-bottom: 30px;
}

/* Make the year badge text visible */
.year-badge h3 {
    font-size: 2rem;
    color: #ffddaa !important;  /* Bright gold color */
    background: rgba(28, 38, 70, 0.9);
    display: inline-block;
    padding: 15px 40px;
    border-radius: 50px;
    border: 2px solid #ffbc6e;
    box-shadow: 0 0 20px rgba(255, 188, 110, 0.3);
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); /* Add glow to text */
}

/* Make the span inside visible */
.year-badge h3 span {
    color: #ffddaa !important;
    font-weight: 700;
}

/* Fix the entire year badge container */
.year-badge h3 {
    background: linear-gradient(145deg, #1e2442, #2a3158) !important;
    border: 3px solid #ffbc6e !important;

    /* Make text sharp */
    text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3) !important; /* Sharp shadow instead of blur */
}

/* Make the span text extra sharp */

/* Make the icon visible */

/* Month Navigation */
.month-nav {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-bottom: 30px;
}

.month-nav button {
    background: rgba(28, 38, 70, 0.8);
    border: 2px solid #5f7ac0;
    color: #ffbc6e;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.3rem;
    transition: all 0.3s ease;
}

.month-nav button:hover {
    border-color: #ffbc6e;
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(255, 188, 110, 0.4);
}

.month-nav #monthDisplay {
    font-size: 2.2rem;
    color: #ffddaa;
    font-weight: 600;
    min-width: 200px;
    text-align: center;
}

/* Weekdays */
.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-bottom: 15px;
    padding: 0 10px;
}

.weekdays div {
    text-align: center;
    font-weight: 600;
    color: #ffbc6e;
    font-size: 1.1rem;
    padding: 10px;
    background: rgba(28, 38, 70, 0.5);
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Calendar Grid */
.calendar-container {
    padding: 10px;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

/* Calendar Day Cells */
.calendar-day {
    background: rgba(28, 38, 70, 0.6);
    border: 2px solid rgba(95, 122, 192, 0.4);
    border-radius: 15px;
    padding: 15px 10px;
    min-height: 90px;
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
    cursor: pointer;
}

.calendar-day:hover {
    transform: translateY(-3px);
    border-color: #ffbc6e;
    box-shadow: 0 5px 15px rgba(255, 188, 110, 0.2);
    background: rgba(38, 48, 80, 0.8);
}

.calendar-day.empty {
    background: transparent;
    border: 2px dashed rgba(95, 122, 192, 0.2);
    cursor: default;
}

.calendar-day.empty:hover {
    transform: none;
    border-color: rgba(95, 122, 192, 0.2);
    box-shadow: none;
    background: transparent;
}

.calendar-day .day-number {
    font-size: 1.3rem;
    font-weight: 600;
    color: #ffddaa;
    margin-bottom: 8px;
}

.calendar-day .day-content {
    font-size: 0.75rem;
    color: #b7c7ff;
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.calendar-day .streak-indicator {
    color: #ffbc6e;
    font-size: 0.7rem;
    display: flex;
    align-items: center;
    gap: 3px;
}

/* Different states for days */
.calendar-day.completed {
    border-color: #4f73f5;
    background: rgba(47, 78, 176, 0.3);
}

.calendar-day.completed .day-number {
    color: #a0c0ff;
}

.calendar-day.in-progress {
    border-color: #f0b856;
    background: rgba(240, 184, 86, 0.15);
}

.calendar-day.in-progress .day-number {
    color: #ffddaa;
}

/* Month selector */
.month-selector {
    text-align: center;
    margin: 20px 0;
}

/* Responsive */
@media screen and (max-width: 768px) {
    .calendar-2026 {
        padding: 15px;

    }
    
    .month-nav #monthDisplay {
        font-size: 1.5rem;
        min-width: 150px;
    }
}

/* Animation delays */
.delay-1 {
    animation-delay: 0.1s;
}

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                // Calendar configuration
                const months = [
                    'January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'
                ];

                let currentMonth = 0; // January (0-based index)
                let currentYear = 2026;

                // Learning topics for each month (customize these)
                const monthlyTopics = {
                    0: 'HTML & CSS Basics',      // January
                    1: 'CSS Layouts',             // February
                    2: 'JavaScript Fundamentals', // March
                    3: 'DOM Manipulation',        // April
                    4: 'Advanced JS',             // May
                    5: 'Async JavaScript',        // June
                    6: 'React Basics',            // July
                    7: 'React Hooks',             // August
                    8: 'Node.js',                  // September
                    9: 'Express & APIs',           // October
                    10: 'Database Basics',         // November
                    11: 'Final Projects'           // December
                };

                // Get DOM elements
                const monthDisplay = document.getElementById('monthDisplay');
                const currentMonthName = document.getElementById('currentMonthName');
                const calendarGrid = document.getElementById('year2026Grid');
                const prevBtn = document.getElementById('prevMonth');
                const nextBtn = document.getElementById('nextMonth');

                // Sample streak data (days where user was active)
                // Format: 'YYYY-MM-DD': 'completed' or 'in-progress'
                const streakData = {
                    '2026-01-01': 'completed',
                    '2026-01-02': 'completed',
                    '2026-01-03': 'completed',
                    '2026-01-04': 'completed',
                    '2026-01-05': 'completed',
                    '2026-01-06': 'completed',
                    '2026-01-07': 'completed',
                    '2026-01-08': 'completed',
                    '2026-01-09': 'completed',
                    '2026-01-10': 'completed',
                    '2026-01-11': 'completed',
                    '2026-01-12': 'completed',
                    '2026-01-13': 'completed',
                    '2026-01-14': 'completed',
                    '2026-01-15': 'completed',
                    '2026-01-16': 'completed',
                    '2026-01-17': 'in-progress',
                    '2026-01-18': 'in-progress',
                    '2026-01-19': 'in-progress',
                    // Add more dates as needed
                };

                // Function to render calendar
                function renderCalendar() {
                    // Update month display
                    monthDisplay.textContent = months[currentMonth];
                    currentMonthName.textContent = months[currentMonth] + ' ' + currentYear;

                    // Get first day of month and total days
                    // Replace these lines:
                    // const firstDay = new Date(currentYear, currentMonth, 1);
                    // const lastDay = new Date(currentYear, currentMonth + 1, 0);

                    // With these:
                    const firstDay = new Date(Date.UTC(currentYear, currentMonth, 1));
                    const lastDay = new Date(Date.UTC(currentYear, currentMonth + 1, 0));

                    // Adjust for Monday first (0 = Sunday, 1 = Monday, etc.)
                    let startDay = firstDay.getDay() - 1; // Convert to Monday-based (0 = Monday)
                    if (startDay === -1) startDay = 6; // Sunday becomes 6

                    const totalDays = lastDay.getDate();

                    // Clear grid
                    calendarGrid.innerHTML = '';

                    // Add empty cells for days before month starts
                    for (let i = 0; i < startDay; i++) {
                        calendarGrid.innerHTML += `<div class="calendar-day empty"></div>`;
                    }

                    // Add cells for each day of the month
                    for (let day = 1; day <= totalDays; day++) {
                        const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        const dayStatus = streakData[dateStr] || '';

                        let statusClass = '';
                        let streakIcon = '';

                        if (dayStatus === 'completed') {
                            statusClass = 'completed';
                            streakIcon = '<i class="fas fa-check-circle"></i> Completed';
                        } else if (dayStatus === 'in-progress') {
                            statusClass = 'in-progress';
                            streakIcon = '<i class="fas fa-spinner"></i> In Progress';
                        }

                        // Determine which week of the month
                        const weekNum = Math.ceil((day + startDay) / 7);

                        // Create day cell HTML
                        calendarGrid.innerHTML += `
                                <div class="calendar-day ${statusClass}" data-date="${dateStr}">
                                    <span class="day-number">${day}</span>
                                    <div class="day-content">
                                        ${streakIcon ? `<span class="streak-indicator">${streakIcon}</span>` : ''}
                                        ${day === 15 ? '<small>⚡ Mid-month</small>' : ''}
                                        ${day === 1 ? '<small>🌟 New month</small>' : ''}
                                    </div>
                                </div>
                            `;
                    }

                    // Calculate remaining cells to fill grid (optional)
                    const totalCells = Math.ceil((startDay + totalDays) / 7) * 7;
                    const remainingCells = totalCells - (startDay + totalDays);

                    for (let i = 0; i < remainingCells; i++) {
                        calendarGrid.innerHTML += `<div class="calendar-day empty"></div>`;
                    }

                    // Add click event to day cells
                    document.querySelectorAll('.calendar-day:not(.empty)').forEach(day => {
                        day.addEventListener('click', function () {
                            const date = this.dataset.date;
                            alert(`Date: ${date}\nTopic: ${monthlyTopics[currentMonth] || 'Learning'}`);
                        });
                    });
                }

                // Event listeners for month navigation
                prevBtn.addEventListener('click', function () {
                    currentMonth--;
                    if (currentMonth < 0) {
                        currentMonth = 11;
                        currentYear--;
                    }
                    renderCalendar();
                });

                nextBtn.addEventListener('click', function () {
                    currentMonth++;
                    if (currentMonth > 11) {
                        currentMonth = 0;
                        currentYear++;
                    }
                    renderCalendar();
                });

                // Initial render
                renderCalendar();
            });
        </script>
